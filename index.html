<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موعد الغالية 🌸</title>
    <style>
        :root {
            --neon-pink: #FF69B4;
            --neon-glow: 0 0 10px #FF69B4, 0 0 20px #FF69B4;
            --dark-bg: #050505;
            --card-bg: #0d0d0d;
            --yellow-neon: #FFFF00;
            --soft-pink: #FFB6C1;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* أنيميشن الخلفية اللطيف */
        .bg-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .main-card {
            background: var(--card-bg);
            border: 2px solid var(--neon-pink);
            border-radius: 40px;
            padding: 35px 25px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--neon-glow);
            text-align: center;
            position: relative;
        }

        .flower-icon { font-size: 65px; margin-bottom: 5px; display: block; filter: drop-shadow(0 0 10px var(--neon-pink)); }

        h1 { color: var(--neon-pink); font-size: 38px; margin: 10px 0; text-shadow: var(--neon-glow); font-weight: 900; }

        .clinic { color: var(--yellow-neon); font-size: 26px; font-weight: bold; margin-bottom: 35px; display: block; text-shadow: 0 0 5px rgba(255, 255, 0, 0.5); }

        .section-label { font-size: 20px; color: #ccc; margin-bottom: 8px; display: block; text-align: right; padding-right: 10px; font-weight: bold; }

        /* تنسيق كروت النيون */
        .neon-box {
            background: #000;
            border: 1.5px solid rgba(255, 105, 180, 0.4);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(255, 105, 180, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .date-val { font-size: 30px; font-weight: bold; color: #fff; letter-spacing: 0.5px; }
        .time-val { font-size: 34px; font-weight: 900; color: #fff; }

        /* العداد التنازلي */
        .countdown-container {
            background: linear-gradient(135deg, #FF1493, #FF69B4);
            padding: 20px 10px;
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            color: #000;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
        }

        .cd-item { display: flex; flex-direction: column; align-items: center; min-width: 70px; }
        .cd-num { font-size: 30px; font-weight: 900; }
        .cd-unit { font-size: 14px; font-weight: bold; }

        /* زر الصوت الاحترافي */
        .audio-btn {
            background: var(--yellow-neon);
            color: #000;
            border: none;
            width: 100%;
            padding: 22px;
            font-size: 24px;
            font-weight: 900;
            border-radius: 22px;
            margin-top: 35px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b3b300, 0 10px 20px rgba(255, 255, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.1s;
        }

        .audio-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b3b300; }

        .final-quote {
            margin-top: 45px;
            font-size: 22px;
            color: var(--soft-pink);
            line-height: 1.6;
            font-weight: bold;
            padding: 0 10px;
            text-shadow: 0 0 8px rgba(255, 182, 193, 0.4);
        }

    </style>
</head>
<body>

    <div class="bg-stars" id="stars"></div>

    <main class="main-card">
        <span class="flower-icon">🌸</span>
        <h1>موعد الغالية</h1>
        <span class="clinic">عيادة الماء الأزرق</span>

        <span class="section-label">اليوم والتاريخ</span>
        <div class="neon-box">
            <span class="date-val">2026/04/15 | الأربعاء</span>
        </div>

        <span class="section-label">الوقت</span>
        <div class="neon-box">
            <span class="time-val">07:45 صباحاً</span>
        </div>

        <div class="countdown-container">
            <div class="cd-item"><span id="days" class="cd-num">00</span><span class="cd-unit">يوم</span></div>
            <div class="cd-item"><span id="hours" class="cd-num">00</span><span class="cd-unit">ساعة</span></div>
            <div class="cd-item"><span id="minutes" class="cd-num">00</span><span class="cd-unit">دقيقة</span></div>
        </div>

        <button class="audio-btn" onclick="speakDetails()" id="speakBtn">
            <span>🔊</span> استماع للتفاصيل
        </button>

        <p class="final-quote">
            "دام انا عايش تأكدي يا اجمل والطف قلب اني سندك وانك بأمان"
        </p>
    </main>

    <script>
        // خلق نجوم في الخلفية
        const starContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 3 + 's';
            starContainer.appendChild(star);
        }

        // العداد التنازلي
        const targetDate = new Date("April 15, 2026 07:45:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) return;
            document.getElementById('days').innerText = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // نظام النطق الصوتي المدمج (آمن ومجاني للأبد)
        function speakDetails() {
            // إيقاف أي صوت حالي
            window.speechSynthesis.cancel();

            const text = "يا أغلى وألطف قلب، موعدك في عيادة الماء الأزرق هو يوم الأربعاء، الخامس عشر من أبريل، الساعة السابعة وخمسة وأربعين دقيقة صباحاً. وتذكري دائماً، دام أخوكِ حي، أنتِ في أمان وسندك موجود دائماً.";
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA'; // لغة عربية
            utterance.rate = 0.85; // سرعة هادئة
            utterance.pitch = 1.1; // طبقة صوت أنثوية ناعمة

            // محاولة اختيار صوت أنثوي إذا توفر في النظام
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Siri') || v.name.includes('Google'));
            if (femaleVoice) utterance.voice = femaleVoice;

            window.speechSynthesis.speak(utterance);
        }

        // تحميل الأصوات مسبقاً لضمان العمل فور الضغط
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
