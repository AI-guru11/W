<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موعد الغالية 🌸</title>
    <!-- استدعاء مكتبة توليد الـ QR Code لضمان عمله دائماً -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --neon-pink: #FF69B4;
            --neon-glow: 0 0 10px #FF69B4, 0 0 20px #FF69B4;
            --dark-bg: #050505;
            --card-bg: #0d0d0d;
            --yellow-neon: #FFFF00;
            --soft-pink: #FFB6C1;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-card {
            background: var(--card-bg);
            border: 2px solid var(--neon-pink);
            border-radius: 40px;
            padding: 35px 25px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--neon-glow);
            text-align: center;
            position: relative;
        }

        /* أنيميشن الرأس (Header Animation) */
        .flower-icon { 
            font-size: 65px; 
            margin-bottom: 5px; 
            display: block; 
            filter: drop-shadow(0 0 10px var(--neon-pink));
            animation: floatHeader 3s ease-in-out infinite;
        }

        @keyframes floatHeader {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); filter: drop-shadow(0 0 25px var(--neon-pink)); }
        }

        h1 { color: var(--neon-pink); font-size: 38px; margin: 10px 0; text-shadow: var(--neon-glow); font-weight: 900; }

        .clinic { color: var(--yellow-neon); font-size: 26px; font-weight: bold; margin-bottom: 35px; display: block; text-shadow: 0 0 5px rgba(255, 255, 0, 0.5); }

        .section-label { font-size: 20px; color: #ccc; margin-bottom: 8px; display: block; text-align: right; padding-right: 10px; font-weight: bold; }

        /* تنسيق كروت النيون */
        .neon-box {
            background: #000;
            border: 1.5px solid rgba(255, 105, 180, 0.4);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 15px rgba(255, 105, 180, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .date-val { font-size: 30px; font-weight: bold; color: #fff; letter-spacing: 0.5px; }
        .time-val { font-size: 34px; font-weight: 900; color: #fff; }

        /* العداد التنازلي */
        .countdown-container {
            background: linear-gradient(135deg, #FF1493, #FF69B4);
            padding: 20px 10px;
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            color: #000;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
        }

        .cd-item { display: flex; flex-direction: column; align-items: center; min-width: 70px; }
        .cd-num { font-size: 30px; font-weight: 900; }
        .cd-unit { font-size: 14px; font-weight: bold; }

        /* تنسيق الـ QR Code الجديد */
        .qr-wrapper {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qr-container {
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid var(--neon-pink);
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.5);
            display: inline-block;
        }

        .qr-hint {
            color: var(--soft-pink);
            font-size: 18px;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 182, 193, 0.5);
        }

        /* أنيميشن التذييل (Footer Animation) */
        .final-quote {
            margin-top: 40px;
            font-size: 22px;
            color: var(--soft-pink);
            line-height: 1.6;
            font-weight: bold;
            padding: 0 10px;
            animation: pulseFooter 4s ease-in-out infinite;
        }

        @keyframes pulseFooter {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 5px rgba(255, 182, 193, 0.4); }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255, 182, 193, 0.9); }
        }

    </style>
</head>
<body>

    <main class="main-card">
        <!-- الوردة المتحركة في الأعلى -->
        <span class="flower-icon">🌸</span>
        <h1>موعد الغالية</h1>
        <span class="clinic">عيادة الماء الأزرق</span>

        <span class="section-label">اليوم والتاريخ</span>
        <div class="neon-box">
            <span class="date-val">2026/04/15 | الأربعاء</span>
        </div>

        <span class="section-label">الوقت</span>
        <div class="neon-box">
            <span class="time-val">07:45 صباحاً</span>
        </div>

        <div class="countdown-container">
            <div class="cd-item"><span id="days" class="cd-num">00</span><span class="cd-unit">يوم</span></div>
            <div class="cd-item"><span id="hours" class="cd-num">00</span><span class="cd-unit">ساعة</span></div>
            <div class="cd-item"><span id="minutes" class="cd-num">00</span><span class="cd-unit">دقيقة</span></div>
        </div>

        <!-- قسم الـ QR Code الوردي -->
        <div class="qr-wrapper">
            <div id="qrcode" class="qr-container"></div>
            <span class="qr-hint">امسح الكود لفتح الصفحة مباشرة</span>
        </div>

        <!-- العبارة الختامية المتحركة في الأسفل -->
        <p class="final-quote">
            "دام انا عايش تأكدي يا اجمل والطف قلب اني سندك وانك بأمان"
        </p>
    </main>

    <script>
        // العداد التنازلي
        const targetDate = new Date("April 15, 2026 07:45:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) return;
            document.getElementById('days').innerText = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // توليد الـ QR Code باللون الوردي المفضل
        const qrContainer = document.getElementById("qrcode");
        new QRCode(qrContainer, {
            text: "https://ai-guru11.github.io/W/",
            width: 180, // العرض
            height: 180, // الطول
            colorDark : "#FF1493", // لون الباركود (وردي غامق/نيون)
            colorLight : "#ffffff", // لون الخلفية (أبيض)
            correctLevel : QRCode.CorrectLevel.H // دقة عالية لسهولة المسح
        });
    </script>
</body>
</html>
